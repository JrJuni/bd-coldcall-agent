# Phase 13A - Alembic configuration.
#
# The actual DB URL is resolved in alembic/env.py from DATABASE_URL
# (matching src/api/config.py::_resolve_database_url), so the
# sqlalchemy.url key here is intentionally a no-op placeholder.
#
# This file is read by alembic in cp949 on Windows boxes (configparser
# default), so keep it strictly ASCII to avoid UnicodeDecodeError on env
# lookup. Same constraint as main.py stdout reconfigure.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = sqlite:///data/app.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
