# Intent tier list for Phase 8 (A) Related channel.
# Generated by `scripts/draft_intent_tiers.py` (Sonnet 1-shot) and then
# hand-edited based on real search-result quality. Runtime is purely
# static — no LLM call per execution.
#
# Tier weight (used to allocate the channel's article cap, default 15):
#   S = 5  A = 4  B = 3  C = 2
# Tier guidance:
#   S — direct product fit, near-term BD trigger
#   A — strong alignment, supporting talking points
#   B — adjacent signals worth including
#   C — long-shot, drop first under quota pressure

intents:
  - label: data_platform_modernization
    tier: S
    description: Cloud data platform / lakehouse modernization that creates demand for our product.
    keywords_en: [lakehouse, data platform modernization, ETL replacement]
    keywords_ko: [데이터 플랫폼 현대화, 데이터 레이크하우스]

  - label: enterprise_ai_adoption
    tier: A
    description: Enterprise rollout of generative AI / ML platforms that align with our offering.
    keywords_en: [enterprise AI deployment, generative AI rollout]
    keywords_ko: [엔터프라이즈 AI 도입, 생성형 AI 도입]

  - label: regulatory_compliance
    tier: B
    description: Compliance pressure (GDPR / data residency / on-prem) that drives platform decisions.
    keywords_en: [data residency, AI governance regulation]
    keywords_ko: [데이터 주권, AI 규제]

  - label: cost_optimization
    tier: C
    description: Cloud cost / infra rationalization stories — secondary differentiation point.
    keywords_en: [cloud cost optimization, FinOps]
    keywords_ko: [클라우드 비용 최적화]
