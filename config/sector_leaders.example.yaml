# Phase 9.1 — Sector leader seeds for Discovery (mega-cap bias mitigation).
#
# `discover` injects this list as `<sector_leader_seeds>` into the volatile
# block so Sonnet has concrete mid-market / regional / specialist names to
# pick from beyond Fortune 500. The flat layout intentionally lets you mix
# regions and industries in any order — Discovery's region multi-select
# filters at runtime by country code.
#
# Fields
# ------
# name           : The company name as Sonnet should write it (English or local).
# industry_hint  : Loose label — match against `industry_meta` keys at runtime
#                  is fuzzy, so canonical English ("Financial Services",
#                  "Manufacturing & Supply Chain") is recommended.
# region         : ISO 3166-1 alpha-2 (lowercase) — kr, us, de, gb, jp, ...
#                  Or the special value "global" for HQ-agnostic seeds that
#                  should always pass any country filter. Country master is
#                  `config/regions.yaml`.
# notes          : Optional free-form note to bias Sonnet's rationale.
#
# Operational use
# ---------------
# Copy this file to `config/sector_leaders.yaml` (gitignored) and edit. Or
# generate a draft with: `python -m scripts.draft_sector_leaders`.

version: 1

companies:
