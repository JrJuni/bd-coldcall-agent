# Phase 9.1 — Discovery scoring weights.
#
# Sonnet emits 0-10 scores per dimension; the runtime computes
# final_score = sum(score[k] * weight[k]) and decides tier via tier_rules.yaml.
#
# Layer 1: `default` — applied to every product unless overridden.
# Layer 2: `products.<name>.weights` — partial override. Dimensions not listed
#          inherit from `default`. The runtime auto-normalizes the merged
#          weight vector so the absolute values here can drift from 1.0;
#          relative ratios are what matters.
#
# Phase 12: each product entry now also carries a `description` shown as a
# tooltip in the Discovery form's product dropdown. Legacy flat-dict yamls
# (no `weights:` key) still parse — pydantic wraps them transparently.
#
# Editing notes:
#   - Higher weight = dimension matters more for THIS product.
#   - Add a new product by adding a new key under `products` with a
#     `description` and a `weights` map listing only the dimensions you
#     want to bend; everything else uses `default`.

version: 1

default:
  pain_severity: 0.25         # 고객사가 해결해야 할 데이터/AI 문제의 크기
  data_complexity: 0.20       # 데이터 규모, 실시간성, 비정형/정형 혼합도
  governance_need: 0.15       # 규제, 보안, 권한관리, lineage 필요성
  ai_maturity: 0.15           # AI/ML 조직과 활용도가 이미 충분한가
  buying_trigger: 0.15        # 최근 투자, 조직개편, 제품출시, 비용절감 압박 등 why now
  displacement_ease: 0.10     # 경쟁 솔루션/내재화 장벽을 뚫기 쉬운가

products:
  databricks:
    description: >
      Databricks / Lakehouse 플랫폼 — data complexity + governance 가중.
      lakehouse·governance·displacement 셀링 포인트를 강조한다.
    weights:
      data_complexity: 0.25
      governance_need: 0.20
      displacement_ease: 0.10
